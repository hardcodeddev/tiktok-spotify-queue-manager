services:
  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && node server.js"
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - PORT=4000
      - WEB_ORIGIN=http://localhost:5173

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - api
