services:
  - type: web
    name: tiktok-spotify-queue
    env: node
    plan: free
    buildCommand: npm install --prefix backend && cd frontend && npm install --production=false && npm run build
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: WEB_ORIGIN
        value: https://tiktok-spotify-queue.onrender.com # Change this to your actual Render URL
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CALLBACK_URL
        value: https://tiktok-spotify-queue.onrender.com/auth/spotify/callback
      - key: TIKTOK_SIGN_API_KEY
        sync: false
      # Firebase Admin SDK (backend) — viewer token verification
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      # Firebase Web SDK (frontend) — public, read at build time by Vite
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
